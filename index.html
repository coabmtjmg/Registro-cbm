<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <!-- Meta tag essencial para mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CBM - Registro Mobile</title>
    <style>
        :root { 
            --primary: #d32f2f; 
            --secondary: #2e7d32; 
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-image: url('https://lh3.googleusercontent.com/d/1GAVAZJ7wPXu5dE_6qFKsnSPyJVwQJ6vn');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            display: flex; 
            justify-content: center; 
            padding: 10px; /* Reduzi o padding para ganhar espaço no mobile */
            margin: 0; 
            min-height: 100vh;
        }

        .card { 
            background: rgba(255, 255, 255, 0.96); 
            padding: 20px; /* Ajuste para mobile */
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); 
            width: 100%; 
            max-width: 800px; 
            text-align: center;
            backdrop-filter: blur(8px);
            box-sizing: border-box; /* Garante que o padding não estoure a largura */
        }
        
        .logo-container { margin-bottom: 10px; }
        .logo-container img { 
            width: 150px; /* Tamanho ligeiramente menor para mobile */
            max-width: 100%;
            height: auto; 
            display: block;
            margin: 0 auto;
        }

        h2 { 
            color: var(--primary); 
            margin-top: 10px; 
            border-bottom: 2px solid #eee; 
            padding-bottom: 10px; 
            font-size: 1.2rem; /* Fonte adaptável */
            text-transform: uppercase; 
        }
        
        label { 
            display: block; 
            font-weight: bold; 
            margin-top: 15px; 
            text-align: left; 
            font-size: 14px; 
            color: #444; 
        }

        /* Inputs otimizados para mobile */
        select, input { 
            width: 100%; 
            padding: 14px; /* Mais alto para facilitar o toque */
            margin-top: 5px; 
            border: 1px solid #ccc; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 16px; /* Evita zoom automático no iPhone */
            -webkit-appearance: none; /* Remove estilos padrão do Safari */
        }

        .resumo-container { 
            background: #fafafa; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            margin: 20px 0; 
            display: none; 
            text-align: left; 
            overflow-x: auto; /* Permite scroll lateral na tabela se necessário */
        }

        .resumo-header { background: #333; color: white; padding: 10px; font-size: 11px; text-align: center; font-weight: bold; }
        
        .tabela-resumo { width: 100%; border-collapse: collapse; font-size: 12px; }
        .tabela-resumo th { background: #f1f1f1; padding: 10px; border: 1px solid #eee; width: 40%; color: #666; }
        .tabela-resumo td { padding: 10px; border: 1px solid #eee; color: var(--primary); font-weight: bold; }

        .preview-box { margin-top: 20px; border: 1px solid #ccc; border-radius: 8px; overflow: hidden; display: none; background: white; }
        .preview-box iframe { width: 100%; height: 300px; border: none; }

        /* Botão grande para polegar */
        button { 
            width: 100%; 
            background: var(--secondary); 
            color: white; 
            border: none; 
            padding: 18px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 18px; 
            font-weight: bold; 
            margin-top: 25px; 
            transition: background 0.3s;
            -webkit-tap-highlight-color: transparent; /* Remove brilho de clique no mobile */
        }
        button:active { background: #1b5e20; transform: scale(0.98); }

        .loading { color: var(--primary); padding: 20px; font-weight: bold; }

        /* Media Query para telas muito pequenas */
        @media (max-width: 480px) {
            .card { padding: 15px; }
            h2 { font-size: 1rem; }
            .tabela-resumo th, .tabela-resumo td { padding: 8px; font-size: 11px; }
        }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-container">
        <img src="https://lh3.googleusercontent.com/d/1di79KvirmO-FntvmVqmU76TxJO5I4mwb" alt="Logo CBM">
    </div>

    <h2>Registro e Consulta CBM</h2>
    
    <label>Selecione a Categoria:</label>
    <select id="aba">
        <option value="" disabled selected>Escolha uma opção...</option>
        <option value="Atividades">Atividades</option>
        <option value="AVCB">AVCB</option>
        <option value="Brigada">Brigada</option>
        <option value="Eventos">Eventos</option>
        <option value="Pareceres">Pareceres</option>
        <option value="Projetos Aprovados">Projetos Aprovados</option>
        <option value="REDS">REDS</option>
        <option value="Vistoria">Vistoria</option>
    </select>

    <div id="status"></div>

    <!-- Preview Mobile-friendly -->
    <div id="previewContainer" class="preview-box">
        <div class="resumo-header">👀 CONSULTA RÁPIDA (HISTÓRICO)</div>
        <iframe id="sheetPreview" src=""></iframe>
    </div>

    <div id="resumoContainer" class="resumo-container">
        <div class="resumo-header">🔍 ÚLTIMO LANÇAMENTO</div>
        <table id="tabelaResumo" class="tabela-resumo"></table>
    </div>

    <form id="formEnvio" style="display:none; text-align: left;">
        <div id="containerCampos"></div>
        <button type="submit" id="btnEnviar">SALVAR REGISTRO</button>
    </form>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxK18kTVh_cOA4a1kabh0HTkm3lueZxb18wSAKKETztne4k3JbP02p5ZJ1QbYyLcqg/exec";
    const SHEET_BASE_URL = "https://docs.google.com/spreadsheets/d/1sv9dplCGivR3x6SF80fdXA48PL5oFHz_z98XE2zRmG4/htmlembed";

    const selectAba = document.getElementById("aba");
    const status = document.getElementById("status");
    const previewContainer = document.getElementById("previewContainer");
    const sheetPreview = document.getElementById("sheetPreview");
    const resumoContainer = document.getElementById("resumoContainer");
    const tabelaResumo = document.getElementById("tabelaResumo");
    const container = document.getElementById("containerCampos");
    const form = document.getElementById("formEnvio");

    selectAba.addEventListener("change", async function() {
        const aba = this.value;
        status.innerHTML = '<div class="loading">⏳ Conectando...</div>';
        resumoContainer.style.display = "none";
        previewContainer.style.display = "none";
        form.style.display = "none";
        container.innerHTML = "";

        try {
            const res = await fetch(`${SCRIPT_URL}?action=getHeaders&sheetName=${aba}`);
            const data = await res.json();
            status.innerHTML = "";

            if (data.headers && data.headers.length > 0) {
                // Ajuste do Preview para Mobile
                sheetPreview.src = `${SHEET_BASE_URL}?gid=${data.sheetId}&widget=false&chrome=false&headers=false`;
                previewContainer.style.display = "block";

                let resumoHTML = "";
                data.headers.forEach((titulo, index) => {
                    const valorAnterior = (data.lastRowValues && data.lastRowValues[index] !== undefined && data.lastRowValues[index] !== "") 
                                          ? data.lastRowValues[index] : "---";

                    resumoHTML += `<tr><th>${titulo}</th><td>${valorAnterior}</td></tr>`;

                    const div = document.createElement("div");
                    div.innerHTML = `<label>${titulo}</label><input type="text" name="i_${index}" required placeholder="Novo valor para ${titulo}...">`;
                    container.appendChild(div);
                });

                tabelaResumo.innerHTML = resumoHTML;
                resumoContainer.style.display = "block";
                form.style.display = "block";
                
                // Rola suavemente para o formulário no mobile
                setTimeout(() => {
                    form.scrollIntoView({ behavior: 'smooth' });
                }, 500);
            }
        } catch (e) {
            status.innerHTML = "❌ Erro ao carregar dados.";
        }
    });

    document.getElementById("formEnvio").addEventListener("submit", async function(e) {
        e.preventDefault();
        const btn = document.getElementById("btnEnviar");
        const valores = Array.from(container.querySelectorAll("input")).map(i => i.value);
        btn.disabled = true;
        btn.innerText = "ENVIANDO...";

        try {
            await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ aba: selectAba.value, valores: valores }) });
            alert("✅ Registro salvo com sucesso!");
            form.reset();
            selectAba.dispatchEvent(new Event('change'));
        } catch (error) {
            alert("❌ Erro ao salvar.");
        } finally {
            btn.disabled = false;
            btn.innerText = "SALVAR REGISTRO";
        }
    });
</script>

</body>
</html>
