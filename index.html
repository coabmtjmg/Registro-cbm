<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CBM - Registro Mobile</title>
    <style>
        :root { --primary: #d32f2f; --secondary: #2e7d32; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background-image: url('https://lh3.googleusercontent.com/d/1GAVAZJ7wPXu5dE_6qFKsnSPyJVwQJ6vn'); background-size: cover; background-position: center; background-attachment: fixed; display: flex; justify-content: center; padding: 10px; margin: 0; min-height: 100vh; }
        .card { background: rgba(255, 255, 255, 0.97); padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); width: 100%; max-width: 800px; text-align: center; backdrop-filter: blur(10px); box-sizing: border-box; }
        .logo-container img { width: 150px; max-width: 100%; height: auto; display: block; margin: 0 auto 10px; }
        h2 { color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 10px; font-size: 1.2rem; text-transform: uppercase; }
        label { display: block; font-weight: bold; margin-top: 15px; text-align: left; font-size: 14px; color: #444; }
        select, input { width: 100%; padding: 14px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; -webkit-appearance: none; background: white; }
        .resumo-container { background: #fafafa; border: 1px solid #ddd; border-radius: 8px; margin: 20px 0; display: none; text-align: left; }
        .resumo-header { background: #333; color: white; padding: 10px; font-size: 11px; text-align: center; font-weight: bold; }
        .tabela-resumo { width: 100%; border-collapse: collapse; font-size: 12px; }
        .tabela-resumo th { background: #f1f1f1; padding: 10px; border: 1px solid #eee; width: 40%; color: #666; text-align: left; }
        .tabela-resumo td { padding: 10px; border: 1px solid #eee; color: var(--primary); font-weight: bold; }
        .preview-box { margin-top: 20px; border: 1px solid #ccc; border-radius: 8px; overflow: hidden; display: none; background: white; }
        .preview-box iframe { width: 100%; height: 300px; border: none; }
        button { width: 100%; background: var(--secondary); color: white; border: none; padding: 18px; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; margin-top: 25px; }
        .loading { color: var(--primary); padding: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-container">
        <img src="https://lh3.googleusercontent.com/d/1di79KvirmO-FntvmVqmU76TxJO5I4mwb" alt="Logo CBM">
    </div>
    <h2>Registro e Consulta CBM</h2>
    
    <label>Selecione a Categoria:</label>
    <select id="aba">
        <option value="" disabled selected>Escolha uma opção...</option>
        <option value="Atividades">Atividades</option>
        <option value="AVCB">AVCB</option>
        <option value="Brigada">Brigada</option>
        <option value="Eventos">Eventos</option>
        <option value="Pareceres">Pareceres</option>
        <option value="Projetos Aprovados">Projetos Aprovados</option>
        <option value="REDS">REDS</option>
        <option value="Vistoria">Vistoria</option>
    </select>

    <div id="status"></div>

    <div id="previewContainer" class="preview-box">
        <div class="resumo-header">👀 CONSULTA RÁPIDA (HISTÓRICO)</div>
        <iframe id="sheetPreview" src=""></iframe>
    </div>

    <div id="resumoContainer" class="resumo-container">
        <div class="resumo-header">🔍 ÚLTIMO LANÇAMENTO</div>
        <table id="tabelaResumo" class="tabela-resumo"></table>
    </div>

    <form id="formEnvio" style="display:none; text-align: left;">
        <div id="containerCampos"></div>
        <button type="submit" id="btnEnviar">SALVAR REGISTRO</button>
    </form>
</div>

<script>
    // VERIFIQUE ESTA URL: Deve ser a do ÚLTIMO deploy (Nova Versão) que você fez no Google
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxhCBNFPDkKBIKR4nm-Z-7F_cSHhLsLDnq1BtcPjNRwm2LnCRVFcXkhNsqiWJ9b2a73/exec";
    const SHEET_BASE_URL = "https://docs.google.com/spreadsheets/d/1sv9dplCGivR3x6SF80fdXA48PL5oFHz_z98XE2zRmG4/htmlembed";

    const selectAba = document.getElementById("aba");
    const status = document.getElementById("status");
    const previewContainer = document.getElementById("previewContainer");
    const sheetPreview = document.getElementById("sheetPreview");
    const resumoContainer = document.getElementById("resumoContainer");
    const tabelaResumo = document.getElementById("tabelaResumo");
    const container = document.getElementById("containerCampos");
    const form = document.getElementById("formEnvio");

    selectAba.addEventListener("change", async function() {
        const aba = this.value;
        status.innerHTML = '<div class="loading">⏳ Conectando...</div>';
        resumoContainer.style.display = "none";
        previewContainer.style.display = "none";
        form.style.display = "none";
        container.innerHTML = "";

        try {
            const fetchUrl = `${SCRIPT_URL}?action=getHeaders&sheetName=${aba}`;
            const res = await fetch(fetchUrl);
            
            if (!res.ok) throw new Error("Erro na rede: " + res.status);
            
            const data = await res.json();
            status.innerHTML = "";

            if (data.error) {
                status.innerHTML = "❌ Erro no Script: " + data.error;
                return;
            }

            if (data.headers) {
                sheetPreview.src = `${SHEET_BASE_URL}?gid=${data.sheetId}&widget=false&chrome=false&headers=false`;
                previewContainer.style.display = "block";

                let resumoHTML = "";
                data.headers.forEach((titulo, index) => {
                    const valorAnterior = (data.lastRowValues && data.lastRowValues[index] !== undefined) ? data.lastRowValues[index] : "---";
                    resumoHTML += `<tr><th>${titulo}</th><td>${valorAnterior}</td></tr>`;
                    container.innerHTML += `<label>${titulo}</label><input type="text" name="i_${index}" required placeholder="Digite aqui...">`;
                });

                tabelaResumo.innerHTML = resumoHTML;
                resumoContainer.style.display = "block";
                form.style.display = "block";
                setTimeout(() => form.scrollIntoView({ behavior: 'smooth' }), 500);
            }
        } catch (e) {
            status.innerHTML = "❌ Erro ao carregar dados. Verifique a URL do Script.";
            console.error("Erro detalhado:", e);
            alert("Erro técnico: " + e.message + "\nVerifique se o script está publicado para 'Qualquer Pessoa'.");
        }
    });

    document.getElementById("formEnvio").addEventListener("submit", async function(e) {
        e.preventDefault();
        const btn = document.getElementById("btnEnviar");
        const valores = Array.from(container.querySelectorAll("input")).map(i => i.value);
        btn.disabled = true;
        btn.innerText = "ENVIANDO...";

        try {
            await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ aba: selectAba.value, valores: valores }) });
            alert("✅ Registro salvo!");
            location.reload();
        } catch (error) {
            alert("❌ Erro ao salvar.");
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
